server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/experimental_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&connectTimeout=3000&socketTimeout=3000}
    username: ${DB_USERNAME:${MYSQL_USER:root}}
    password: ${DB_PASSWORD:${MYSQL_ROOT_PASSWORD:${MYSQL_PWD:${MYSQL_PASSWORD:}}}}
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 3000
      validation-timeout: 3000
  sql:
    init:
      mode: ${DB_INIT_MODE:never}
      schema-locations: classpath:sql/schema.sql,classpath:sql/schema_patch_v2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

ai:
  provider: ${AI_PROVIDER:mock} # mock | http
  http:
    base-url: ${AI_HTTP_BASE_URL:http://localhost:5000}
    api-key: ${AI_HTTP_API_KEY:}
    timeout-ms: ${AI_HTTP_TIMEOUT_MS:90000}
    model: ${AI_HTTP_MODEL:default}
